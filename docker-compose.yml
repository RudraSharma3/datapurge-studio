services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: datapurge_admin
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: datapurge_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapurge_admin -d datapurge_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://datapurge_admin:postgres@db:5432/datapurge_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      SMTP_SENDER_EMAIL: ${SMTP_SENDER_EMAIL:-}
      MY_ADMIN_INBOX: ${MY_ADMIN_INBOX:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./data-cleaner
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
